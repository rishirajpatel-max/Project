<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio Card</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="card">
      <div class="content1">
        <!-- LEFT CONTENT -->
        <div class="content">
          <h1>Hi, I'm <span>Rishiraj Patel</span></h1>
          <h3>Frontend Developer</h3>

          <p class="bio">
            Passionate about building responsive and modern websites using HTML
            and CSS.
          </p>

          <!-- SKILLS -->
          <div class="skills">
            <span class="skill">HTML</span>
            <span class="skill">CSS</span>
            <span class="skill">JavaScript</span>
          </div>

          <!-- BUTTONS -->
          <div class="buttons">
            <a href="#" class="btn primary">Hire Me</a>
            <a href="#" class="btn secondary">See Projects</a>
          </div>

          <!-- SOCIAL LINKS -->
          <div class="socials">
            <a href="#">GitHub</a>
            <a href="#">LinkedIn</a>
          </div>
        </div>

        <!-- RIGHT IMAGE -->
        <div class="image">
          <img src="rishiprofile.jpeg" alt="Profile Image" />
        </div>
      </div>
    </div>
  </body>
</html>
