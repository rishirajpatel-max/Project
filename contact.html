  <head>

    <title>Login page</title>

  </head>
  <body>

    
    <h1 id="login">Contact Us</h1>

      <!-- <input type="submit" value="Login" /> -->
       <button onclick="alert('Message sent successfully!')">Send Message</button>
    </form>
